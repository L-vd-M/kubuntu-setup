---
- name: Kubuntu PC Setup Playbook with Prerequisites Check
  hosts: localhost
  connection: local
  gather_facts: yes
  
  vars:
    log_dir: "{{ ansible_env.HOME }}/Documents/Ansible_Installation_Log"
    log_file: "{{ log_dir }}/kubuntu_setup_{{ ansible_date_time.iso8601_basic_short }}.log"
    
  pre_tasks:
    - name: Create log directory
      file:
        path: "{{ log_dir }}"
        state: directory
        mode: '0755'
      become: no
      register: log_dir_created

    - name: Initialize log file
      copy:
        content: |
          ========================================
          Kubuntu Setup Playbook Execution Log
          ========================================
          Started: {{ ansible_date_time.iso8601 }}
          Hostname: {{ ansible_hostname }}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Architecture: {{ ansible_architecture }}
          ========================================
          
        dest: "{{ log_file }}"
        mode: '0644'
      become: no

    - name: Log system information
      lineinfile:
        path: "{{ log_file }}"
        line: "{{ item }}"
        state: present
      loop:
        - "Python Version: {{ ansible_python_version }}"
        - "Ansible Version: {{ ansible_version.full }}"
        - "Total Memory: {{ ansible_memtotal_mb }} MB"
        - ""
      become: no

    - name: Check prerequisites
      include_tasks: tasks/check_prerequisites.yml

    - name: Update package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"
      register: apt_update_result
      become: yes

    - name: Log package cache update
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ Package cache updated successfully"
        state: present
      become: no

    - name: Upgrade all packages
      apt:
        upgrade: dist
      when: ansible_os_family == "Debian"
      register: apt_upgrade_result
      become: yes

    - name: Log package upgrade
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ All packages upgraded successfully"
        state: present
      become: no

  tasks:
    - name: Log graphics driver installation
      lineinfile:
        path: "{{ log_file }}"
        line: "\n========== GRAPHICS DRIVER INSTALLATION ==========\nStarted: {{ ansible_date_time.iso8601 }}"
        state: present
      become: no

    - name: Include graphics driver installation tasks
      include_tasks: tasks/graphics.yml
      vars:
        log_file: "{{ log_file }}"

    - name: Log graphics driver completion
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ Graphics driver installation completed\nCompleted: {{ ansible_date_time.iso8601 }}"
        state: present
      become: no

    - name: Log system utilities installation
      lineinfile:
        path: "{{ log_file }}"
        line: "\n========== SYSTEM UTILITIES INSTALLATION ==========\nStarted: {{ ansible_date_time.iso8601 }}"
        state: present
      become: no

    - name: Include system tasks
      include_tasks: tasks/system.yml
      vars:
        log_file: "{{ log_file }}"

    - name: Log system utilities completion
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ System utilities installation completed\nCompleted: {{ ansible_date_time.iso8601 }}"
        state: present
      become: no

    - name: Log programming tools installation
      lineinfile:
        path: "{{ log_file }}"
        line: "\n========== PROGRAMMING TOOLS INSTALLATION ==========\nStarted: {{ ansible_date_time.iso8601 }}"
        state: present
      become: no

    - name: Include programming tasks
      include_tasks: tasks/programming.yml
      vars:
        log_file: "{{ log_file }}"

    - name: Log programming tools completion
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ Programming tools installation completed\nCompleted: {{ ansible_date_time.iso8601 }}"
        state: present
      become: no

    - name: Log productivity applications installation
      lineinfile:
        path: "{{ log_file }}"
        line: "\n========== PRODUCTIVITY APPLICATIONS INSTALLATION ==========\nStarted: {{ ansible_date_time.iso8601 }}"
        state: present
      become: no

    - name: Include productivity tasks
      include_tasks: tasks/productivity.yml
      vars:
        log_file: "{{ log_file }}"

    - name: Log productivity applications completion
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ Productivity applications installation completed\nCompleted: {{ ansible_date_time.iso8601 }}"
        state: present
      become: no

    - name: Log media applications installation
      lineinfile:
        path: "{{ log_file }}"
        line: "\n========== MEDIA & COMMUNICATION APPLICATIONS INSTALLATION ==========\nStarted: {{ ansible_date_time.iso8601 }}"
        state: present
      become: no

    - name: Include media tasks
      include_tasks: tasks/media.yml
      vars:
        log_file: "{{ log_file }}"

    - name: Log media applications completion
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ Media & communication applications installation completed\nCompleted: {{ ansible_date_time.iso8601 }}"
        state: present
      become: no

  post_tasks:
    - name: Clean up package manager cache
      apt:
        autoclean: yes
        autoremove: yes
      when: ansible_os_family == "Debian"
      become: yes

    - name: Log cleanup
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ Package manager cleaned up"
        state: present
      become: no

    - name: Log completion message
      lineinfile:
        path: "{{ log_file }}"
        line: |
          
          ========================================
          ✓ KUBUNTU SETUP COMPLETED SUCCESSFULLY!
          ========================================
          
          Installation Summary:
          - Graphics Drivers: Installed
          - System Utilities: Installed
          - Programming Tools: Installed
          - Productivity Applications: Installed
          - Media & Communication Tools: Installed
          
          Completed: {{ ansible_date_time.iso8601 }}
          
          Please reboot your system for changes to take effect:
          $ sudo reboot
          
          Log file location: {{ log_file }}
          ========================================
        state: present
      become: no

    - name: Display completion message
      debug:
        msg: |
          ========================================
          ✓ Kubuntu setup completed successfully!
          ========================================
          
          Summary of installed software:
          - Graphics Drivers
          - System Utilities
          - Programming Tools
          - Productivity Applications
          - Media & Communication Tools
          
          Log file created at:
          {{ log_file }}
          
          Please reboot your system:
          $ sudo reboot
          
          ========================================
      become: no
