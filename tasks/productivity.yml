---
- name: Productivity and Office Applications
  block:
    - name: Check for Obsidian
      command: which obsidian
      register: obsidian_check
      ignore_errors: yes
      changed_when: false

    - name: Install Obsidian
      block:
        - name: Get latest Obsidian release info
          ansible.builtin.uri:
            url: "https://api.github.com/repos/obsidianmd/obsidian-releases/releases/latest"
            return_content: yes
          register: obsidian_release

        - name: Download Obsidian
          ansible.builtin.get_url:
            url: >-
              {% if dpkg_arch == 'arm64' %}
              {{ obsidian_release.json.assets | selectattr('name', 'search', 'AppImage') | selectattr('name', 'search', 'arm64') | map(attribute='browser_download_url') | first }}
              {% else %}
              {{ obsidian_release.json.assets | selectattr('name', 'search', 'AppImage') | rejectattr('name', 'search', 'arm64') | map(attribute='browser_download_url') | first }}
              {% endif %}
            dest: /tmp/Obsidian-latest.AppImage
            mode: '0755'
            timeout: 60
          ignore_errors: yes
          register: obsidian_download

        - name: Extract Obsidian AppImage
          shell: |
            cd /tmp
            chmod +x Obsidian-latest.AppImage
            ./Obsidian-latest.AppImage --appimage-extract
            rm -rf /opt/obsidian
            mv squashfs-root /opt/obsidian
          when: obsidian_download.changed | default(false)
          ignore_errors: yes

        - name: Create Obsidian symlink
          file:
            src: /opt/obsidian/AppRun
            dest: /usr/local/bin/obsidian
            state: link
            force: yes
          ignore_errors: yes

        - name: Create Obsidian Desktop Entry
          copy:
            dest: /usr/share/applications/obsidian.desktop
            content: |
              [Desktop Entry]
              Name=Obsidian
              Exec=/usr/local/bin/obsidian %u
              Terminal=false
              Type=Application
              Icon=obsidian
              StartupWMClass=obsidian
              Comment=Obsidian Note-Taking App
              Categories=Office;
            mode: '0644'
          ignore_errors: yes

        - name: Clean up installer
          file:
            path: /tmp/Obsidian-latest.AppImage
            state: absent
          ignore_errors: yes

        - name: Log Obsidian installation
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ Obsidian note-taking app - Status: Installed"
            state: present
          become: no
          when: obsidian_download.changed | default(false)

    - name: Check for Zotero
      command: which zotero
      register: zotero_check
      ignore_errors: yes
      changed_when: false

    - name: Install Zotero dynamically via interactive menu
      block:
        - name: Zotero Interactive Downloader
          block:
            - name: Fetch robust list of Zotero release tags from GitHub
              # The GitHub API provides the most comprehensive history of versions natively
              uri:
                url: "https://api.github.com/repos/zotero/zotero/tags?per_page=100"
                return_content: yes
              register: zotero_tags_response

            - name: Parse available Zotero tags
              set_fact:
                zotero_all_versions: "{{ zotero_tags_response.json | map(attribute='name') | list }}"

            - name: Extract unique major versions (e.g., 6, 7, 8)
              # Using string split instead of regex to cleanly isolate the major digits
              # without running into YAML / Jinja2 backslash escape complexities
              set_fact:
                zotero_major_versions: >-
                  {{
                    zotero_all_versions 
                    | map('split', '.') 
                    | map(attribute=0)
                    | unique 
                    | list 
                  }}

            - name: Prompt user to select a major version
              pause:
                prompt: "\nAvailable Major Zotero Versions: {{ zotero_major_versions | join(', ') }}\nPlease select a major version (or press Enter for '{{ zotero_major_versions[0] }}'):"
              register: zotero_major_prompt

            - name: Resolve major version
              set_fact:
                selected_major: "{{ zotero_major_prompt.user_input | default(zotero_major_versions[0], true) }}"

            - name: Filter minor versions for selected major version
              # Using `[.]` literal character class instead of `\\.` to match the dot safely
              set_fact:
                available_minor_versions: >-
                  {{
                    zotero_all_versions 
                    | select('match', '^' ~ selected_major ~ '[.]') 
                    | list
                  }}

            - name: Limit minor versions to top 15
              set_fact:
                top_minor_versions: "{{ available_minor_versions[:15] }}"

            - name: Prompt user to select a minor version
              pause:
                prompt: "\nAvailable Minor Zotero {{ selected_major }}.x Versions: {{ top_minor_versions | join(', ') }}\nPlease select a minor version (or press Enter for '{{ top_minor_versions[0] }}'):"
              register: zotero_minor_prompt

            - name: Resolve minor version
              set_fact:
                target_zotero_version: "{{ zotero_minor_prompt.user_input | default(top_minor_versions[0], true) }}"

            - name: Set Zotero download URL
              set_fact:
                zotero_url: "https://www.zotero.org/download/client/dl?channel=release&platform=linux-{{ 'x86_64' if dpkg_arch == 'amd64' else 'aarch64' }}&version={{ target_zotero_version }}"

            - name: Download and extract Zotero locally
              # Zotero distributions are tarballs, we unpack straight into /opt
              unarchive:
                src: "{{ zotero_url }}"
                dest: "/opt"
                remote_src: yes
                list_files: yes
              register: zotero_archive

            - name: Determine extracted Zotero directory
              set_fact:
                extracted_dir: "{{ zotero_archive.files[0].split('/')[0] }}"
              when: zotero_archive.files is defined and zotero_archive.files | length > 0

            - name: Create symlink to Zotero executable
              file:
                src: "/opt/{{ extracted_dir | default('Zotero_linux-x86_64') }}/zotero"
                dest: "/usr/local/bin/zotero"
                state: link
                force: yes
              register: zotero_install
          when: zotero_check.rc != 0

        - name: Log Zotero installation
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ Zotero citation manager - Status: {{ 'Installed interactively (Tarball)' if zotero_install.changed | default(false) else 'Already installed' }}"
            state: present
          become: no

    - name: Check for Google Chrome
      command: which google-chrome
      register: chrome_check
      ignore_errors: yes
      changed_when: false

    - name: Install Google Chrome
      block:
        - name: Download Chrome GPG key
          get_url:
            url: https://dl-ssl.google.com/linux/linux_signing_key.pub
            dest: /etc/apt/keyrings/google-chrome.asc
            mode: '0644'
            force: yes
          ignore_errors: yes

        - name: Add Chrome repository
          apt_repository:
            repo: "deb [arch={{ dpkg_arch }} signed-by=/etc/apt/keyrings/google-chrome.asc] http://dl.google.com/linux/chrome/deb/ stable main"
            state: present
          ignore_errors: yes

        - name: Install Google Chrome
          apt:
            name: google-chrome-stable
            state: present
            update_cache: yes
          register: chrome_install
          when: chrome_check.rc != 0
          ignore_errors: yes

        - name: Log Chrome installation
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ Google Chrome browser - Status: {{ 'Installed' if chrome_install.changed | default(false) else 'Already installed' }}"
            state: present
          become: no

    - name: Check for WinApps
      command: which winapps
      register: winapps_check
      ignore_errors: yes
      changed_when: false

    - name: Install WinApps
      block:
        - name: Check if git is available
          command: which git
          register: git_winapps_check
          ignore_errors: yes
          changed_when: false

        - name: Clone WinApps repository
          git:
            repo: https://github.com/Fmstrat/winapps.git
            dest: /opt/winapps
          when: git_winapps_check.rc == 0 and winapps_check.rc != 0
          ignore_errors: yes
          register: winapps_clone

        - name: Skip interactive WinApps installer (requires manual setup)
          debug:
            msg: "WinApps cloned to /opt/winapps — run './install.sh' manually after configuring your Windows VM."
          register: winapps_install
          when: winapps_clone.changed | default(false)

        - name: Log WinApps installation
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ WinApps - Status: {{ 'Installed' if winapps_install.changed | default(false) else 'Already installed or requires manual setup' }}"
            state: present
          become: no

        - name: Log WinApps manual instructions
          lineinfile:
            path: "{{ log_file }}"
            line: "  Note: For Excel, Outlook, and WhatsApp, run 'winapps install <app>' after setup"
            state: present
          become: no

    - name: Install Academic Writing and Reading Suite (APT)
      apt:
        name:
          - okular
          - texstudio
          - pandoc
        state: present
      register: apt_academic_install

    - name: Log Academic Suite installation
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ Academic Suite (Okular, TeXstudio, Pandoc) - Status: {{ 'Installed' if apt_academic_install.changed | default(false) else 'Already installed' }}"
        state: present
      become: no

    - name: Check for SNAP availability
      command: which snap
      register: snap_check
      ignore_errors: yes
      changed_when: false

    - name: Install Advanced Telecommunications Productivity Suite (Snap)
      command: snap install {{ item }}
      loop:
        - superproductivity
        - drawio
      when: snap_check.rc == 0
      register: snap_prod_install
      changed_when: false
      ignore_errors: yes

    - name: Log Snap Productivity Suite installation
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ Snap Productivity Suite (Draw.io, Super Productivity) - Status: Checked or Installed"
        state: present
      become: no

  rescue:
    - name: Log productivity tools error
      lineinfile:
        path: "{{ log_file }}"
        line: "✗ Error during productivity tools installation - continuing with next section"
        state: present
      become: no
