---
- name: Productivity and Office Applications
  block:
    - name: Check for Obsidian
      command: which obsidian
      register: obsidian_check
      ignore_errors: yes
      changed_when: false

    - name: Install Obsidian
      block:
        - name: Get latest Obsidian release info
          ansible.builtin.uri:
            url: "https://api.github.com/repos/obsidianmd/obsidian-releases/releases/latest"
            return_content: yes
          register: obsidian_release

        - name: Download Obsidian
          ansible.builtin.get_url:
            url: >-
              {% if dpkg_arch == 'arm64' %}
              {{ obsidian_release.json.assets | selectattr('name', 'search', 'AppImage') | selectattr('name', 'search', 'arm64') | map(attribute='browser_download_url') | first }}
              {% else %}
              {{ obsidian_release.json.assets | selectattr('name', 'search', 'AppImage') | rejectattr('name', 'search', 'arm64') | map(attribute='browser_download_url') | first }}
              {% endif %}
            dest: /tmp/Obsidian-latest.AppImage
            mode: '0755'
            timeout: 60
          ignore_errors: yes
          register: obsidian_download

        - name: Extract Obsidian AppImage
          shell: |
            cd /tmp
            chmod +x Obsidian-latest.AppImage
            ./Obsidian-latest.AppImage --appimage-extract
            mv squashfs-root /opt/obsidian
          when: obsidian_download.changed | default(false)
          ignore_errors: yes

        - name: Create Obsidian symlink
          file:
            src: /opt/obsidian/AppRun
            dest: /usr/local/bin/obsidian
            state: link
            force: yes
          ignore_errors: yes

        - name: Clean up installer
          file:
            path: /tmp/Obsidian-latest.AppImage
            state: absent
          ignore_errors: yes

        - name: Log Obsidian installation
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ Obsidian note-taking app - Status: Installed"
            state: present
          become: no
          when: obsidian_download.changed | default(false)

    - name: Check for Zotero
      command: which zotero
      register: zotero_check
      ignore_errors: yes
      changed_when: false

    - name: Install Zotero via APT repository
      block:
        - name: Add Zotero APT repository (zotero-deb)
          shell: curl -sL https://raw.githubusercontent.com/retorquere/zotero-deb/master/install.sh | sudo bash
          args:
            creates: /etc/apt/sources.list.d/zotero.list

        - name: Install Zotero
          apt:
            name: zotero
            state: present
            update_cache: yes
          register: zotero_install
          when: zotero_check.rc != 0

        - name: Log Zotero installation
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ Zotero citation manager - Status: {{ 'Installed' if zotero_install.changed | default(false) else 'Already installed' }}"
            state: present
          become: no

    - name: Check for Google Chrome
      command: which google-chrome
      register: chrome_check
      ignore_errors: yes
      changed_when: false

    - name: Install Google Chrome
      block:
        - name: Download Chrome GPG key
          get_url:
            url: https://dl-ssl.google.com/linux/linux_signing_key.pub
            dest: /etc/apt/keyrings/google-chrome.asc
            mode: '0644'
            force: yes
          ignore_errors: yes

        - name: Add Chrome repository
          apt_repository:
            repo: "deb [arch={{ dpkg_arch }} signed-by=/etc/apt/keyrings/google-chrome.asc] http://dl.google.com/linux/chrome/deb/ stable main"
            state: present
          ignore_errors: yes

        - name: Install Google Chrome
          apt:
            name: google-chrome-stable
            state: present
            update_cache: yes
          register: chrome_install
          when: chrome_check.rc != 0
          ignore_errors: yes

        - name: Log Chrome installation
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ Google Chrome browser - Status: {{ 'Installed' if chrome_install.changed | default(false) else 'Already installed' }}"
            state: present
          become: no

    - name: Check for WinApps
      command: which winapps
      register: winapps_check
      ignore_errors: yes
      changed_when: false

    - name: Install WinApps
      block:
        - name: Check if git is available
          command: which git
          register: git_winapps_check
          ignore_errors: yes
          changed_when: false

        - name: Clone WinApps repository
          git:
            repo: https://github.com/Fmstrat/winapps.git
            dest: /opt/winapps
          when: git_winapps_check.rc == 0 and winapps_check.rc != 0
          ignore_errors: yes
          register: winapps_clone

        - name: Run WinApps installer
          shell: cd /opt/winapps && ./install.sh
          when: winapps_clone.changed | default(false)
          ignore_errors: yes
          register: winapps_install

        - name: Log WinApps installation
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ WinApps - Status: {{ 'Installed' if winapps_install.changed | default(false) else 'Already installed or requires manual setup' }}"
            state: present
          become: no

        - name: Log WinApps manual instructions
          lineinfile:
            path: "{{ log_file }}"
            line: "  Note: For Excel, Outlook, and WhatsApp, run 'winapps install <app>' after setup"
            state: present
          become: no

    - name: Install Academic Writing and Reading Suite (APT)
      apt:
        name:
          - okular
          - texstudio
          - pandoc
        state: present
      register: apt_academic_install

    - name: Log Academic Suite installation
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ Academic Suite (Okular, TeXstudio, Pandoc) - Status: {{ 'Installed' if apt_academic_install.changed | default(false) else 'Already installed' }}"
        state: present
      become: no

    - name: Check for SNAP availability
      command: which snap
      register: snap_check
      ignore_errors: yes
      changed_when: false

    - name: Install Advanced Telecommunications Productivity Suite (Snap)
      command: snap install {{ item }}
      loop:
        - superproductivity
        - drawio
      when: snap_check.rc == 0
      register: snap_prod_install
      changed_when: "'installed' in snap_prod_install.stdout"
      ignore_errors: yes

    - name: Log Snap Productivity Suite installation
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ Snap Productivity Suite (Draw.io, Super Productivity) - Status: Checked or Installed"
        state: present
      become: no

  rescue:
    - name: Log productivity tools error
      lineinfile:
        path: "{{ log_file }}"
        line: "✗ Error during productivity tools installation - continuing with next section"
        state: present
      become: no
