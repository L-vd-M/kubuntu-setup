---
- name: Kubuntu PC Setup Playbook
  hosts: localhost
  connection: local
  gather_facts: yes
  become: yes

  vars:
    host_user_home: "{{ lookup('env', 'SUDO_USER') | default(lookup('env', 'USER'), true) | regex_replace('^', '/home/') }}"
    # ============================================
    # LOGGING CONFIGURATION
    # ============================================
    log_dir: "{{ host_user_home }}/Documents/Ansible_Installation_Log"
    log_file: "{{ log_dir }}/kubuntu_setup_{{ ansible_date_time.iso8601_basic_short }}.log"


  # ============================================
  # PRE-TASKS: LOGGING SETUP
  # ============================================
  pre_tasks:
    - name: Ensure log directory exists
      file:
        path: "{{ log_dir }}"
        state: directory
        mode: '0755'
      become: false

    - name: Get dpkg architecture
      command: dpkg --print-architecture
      register: dpkg_arch_cmd
      changed_when: false
      become: false

    - name: Set dpkg architecture fact
      set_fact:
        dpkg_arch: "{{ dpkg_arch_cmd.stdout }}"

    - name: Initialize log file
      copy:
        content: |
          ========================================
          Kubuntu Setup Playbook Execution Log
          ========================================
          Started   : {{ ansible_date_time.iso8601 }}
          Hostname  : {{ ansible_hostname }}
          OS        : {{ ansible_distribution }} {{ ansible_distribution_version }}
          Release   : {{ ansible_distribution_release }}
          Arch      : {{ ansible_architecture }}
          Kernel    : {{ ansible_kernel }}
          ========================================
        dest: "{{ log_file }}"
        mode: '0644'
      become: false

    - name: Log system information
      lineinfile:
        path: "{{ log_file }}"
        line: "{{ item }}"
        state: present
      loop:
        - "Python Version  : {{ ansible_python_version }}"
        - "Ansible Version : {{ ansible_version.full }}"
        - "Total Memory    : {{ ansible_memtotal_mb }} MB"
        - "CPU Cores       : {{ ansible_processor_vcpus }}"
        - "Default IPv4    : {{ ansible_default_ipv4.address | default('N/A') }}"
      become: false

    - name: "[PRE] Record initial installed packages"
      shell: "dpkg-query -W -f='${binary:Package}\n' | sort"
      register: initial_packages
      become: false
      changed_when: false

  # ============================================
  # MAIN TASKS (delegated to task files)
  # ============================================
  tasks:

    # ------------------------------------------
    # SECTION 1: CHECK PREREQUISITES
    # ------------------------------------------
    - name: "[LOG] Section header — Prerequisites"
      lineinfile:
        path: "{{ log_file }}"
        line: "\n========== [1/7] PREREQUISITES =========="
        state: present
      become: false

    - name: "[PREREQ] Run prerequisite checks"
      include_tasks: tasks/check_prerequisites.yml

    # ------------------------------------------
    # SECTION 2: GRAPHICS DRIVER SETUP
    # ------------------------------------------
    - name: "[LOG] Section header — Graphics"
      lineinfile:
        path: "{{ log_file }}"
        line: "\n========== [2/7] GRAPHICS DRIVERS =========="
        state: present
      become: false

    - name: "[GPU] Install graphics drivers"
      include_tasks: tasks/graphics.yml

    # ------------------------------------------
    # SECTION 3: SYSTEM UTILITIES
    # ------------------------------------------
    - name: "[LOG] Section header — System"
      lineinfile:
        path: "{{ log_file }}"
        line: "\n========== [3/7] SYSTEM UTILITIES =========="
        state: present
      become: false

    - name: "[SYS] Install system and utility packages"
      include_tasks: tasks/system.yml

    # ------------------------------------------
    # SECTION 4: PROGRAMMING TOOLS
    # ------------------------------------------
    - name: "[LOG] Section header — Programming"
      lineinfile:
        path: "{{ log_file }}"
        line: "\n========== [4/7] PROGRAMMING TOOLS =========="
        state: present
      become: false

    - name: "[DEV] Install programming and development tools"
      include_tasks: tasks/programming.yml

    # ------------------------------------------
    # SECTION 5: MEDIA & COMMUNICATION
    # ------------------------------------------
    - name: "[LOG] Section header — Media"
      lineinfile:
        path: "{{ log_file }}"
        line: "\n========== [5/7] MEDIA & COMMUNICATION =========="
        state: present
      become: false

    - name: "[MEDIA] Install media and communication apps"
      include_tasks: tasks/media.yml

    # ------------------------------------------
    # SECTION 6: PRODUCTIVITY & OFFICE
    # ------------------------------------------
    - name: "[LOG] Section header — Productivity"
      lineinfile:
        path: "{{ log_file }}"
        line: "\n========== [6/7] PRODUCTIVITY & OFFICE =========="
        state: present
      become: false

    - name: "[PROD] Install productivity and office apps"
      include_tasks: tasks/productivity.yml

    # ------------------------------------------
    # SECTION 7: SYSTEM HIBERNATION
    # ------------------------------------------
    - name: "[LOG] Section header — Hibernation"
      lineinfile:
        path: "{{ log_file }}"
        line: "\n========== [7/7] HIBERNATION =========="
        state: present
      become: false

    - name: "[SYS] Configure System Hibernation"
      include_tasks: tasks/hibernation.yml

  # ============================================
  # POST-TASKS: FINALIZE LOGGING
  # ============================================
  post_tasks:
    - name: "[POST] Record final installed packages"
      shell: "dpkg-query -W -f='${binary:Package}\n' | sort"
      register: final_packages
      become: false
      changed_when: false

    - name: "[POST] Calculate package delta"
      set_fact:
        installed_diff: "{{ final_packages.stdout_lines | difference(initial_packages.stdout_lines) }}"
        removed_diff: "{{ initial_packages.stdout_lines | difference(final_packages.stdout_lines) }}"

    - name: "[POST] Write package delta to log"
      lineinfile:
        path: "{{ log_file }}"
        line: |
          
          ========================================
          📦 PACKAGE DELTA (DURING SETUP)
          ========================================
          Newly Installed Packages:
          {{ installed_diff | join('\n') if installed_diff else 'None' }}

          Removed Packages:
          {{ removed_diff | join('\n') if removed_diff else 'None' }}
          ========================================
        state: present
      become: false

    - name: "[POST] Finalize log with completion timestamp"
      lineinfile:
        path: "{{ log_file }}"
        line: |
          ========================================
          KUBUNTU SETUP COMPLETED SUCCESSFULLY
          Finished : {{ ansible_date_time.iso8601 }}
          ========================================

    - name: "[POST] Log reboot requirement"
      lineinfile:
        path: "{{ log_file }}"
        line: "⚠ REBOOT REQUIRED: GPU drivers and/or hibernation changes need a system restart to take effect."
        state: present
      become: no
      when: needs_reboot | default(false)

    - name: "[POST] Prompt for system reboot if required"
      pause:
        prompt: |

          ========================================
          ⚠  SYSTEM REBOOT REQUIRED
          ========================================
          The following changes need a reboot to activate:
            - NVIDIA GPU drivers (kernel module must be loaded)
            - NVIDIA GRUB kernel parameters (DRM modeset, power management)
            - Hibernation settings (GRUB resume params + initramfs)

          A reboot will be scheduled 1 minute from now if you say yes.
          Do you want to schedule the reboot? (y/N)
      register: reboot_prompt
      when: needs_reboot | default(false)
      become: no

    - name: "[POST] Schedule system reboot in 1 minute"
      command: shutdown -r +1 "Rebooting to apply Kubuntu setup changes (GPU drivers and hibernation)."
      become: yes
      when:
        - needs_reboot | default(false)
        - (reboot_prompt.user_input | default('n', true) | lower) == 'y'

    - name: "[POST] Display log file location"
      debug:
        msg: "Setup complete! Full log available at: {{ log_file }}"
