---
- name: Kubuntu PC Setup Playbook
  hosts: localhost
  connection: local
  gather_facts: yes

  vars:
    log_dir: "{{ ansible_env.HOME }}/Documents/Ansible_Installation_Log"
    log_file: "{{ log_dir }}/kubuntu_setup_{{ ansible_date_time.iso8601_basic_short }}.log"

  pre_tasks:
    - name: Create log directory
      file:
        path: "{{ log_dir }}"
        state: directory
        mode: '0755'
      become: no

    - name: Initialize log file
      copy:
        content: |
          ========================================
          Kubuntu Setup Playbook Execution Log
          ========================================
          Started: {{ ansible_date_time.iso8601 }}
          Hostname: {{ ansible_hostname }}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Architecture: {{ ansible_architecture }}
          ========================================
        dest: "{{ log_file }}"
        mode: '0644'
      become: no

    - name: Log system information
      lineinfile:
        path: "{{ log_file }}"
        line: "{{ item }}"
        state: present
      loop:
        - "Python Version: {{ ansible_python_version }}"
        - "Ansible Version: {{ ansible_version.full }}"
        - "Total Memory: {{ ansible_memtotal_mb }} MB"
      become: no

    - name: Nuclear cleanup of all conflicting repo sources and GPG keys
      shell: |
        rm -f /etc/apt/sources.list.d/vscode.list
        rm -f /etc/apt/sources.list.d/vscode.list.save
        rm -f /etc/apt/sources.list.d/microsoft-prod.list
        rm -f /etc/apt/sources.list.d/nodesource.list
        rm -f /etc/apt/sources.list.d/nodesource.list.save
        rm -f /etc/apt/sources.list.d/spotify.list
        rm -f /etc/apt/sources.list.d/spotify.list.save
        rm -f /etc/apt/sources.list.d/google-chrome.list
        rm -f /etc/apt/sources.list.d/google-chrome.list.save
        rm -f /usr/share/keyrings/microsoft.gpg
        rm -f /usr/share/keyrings/microsoft-archive-keyring.gpg
        rm -f /usr/share/keyrings/packages.microsoft.gpg
        rm -f /usr/share/keyrings/nodesource.gpg
        rm -f /usr/share/keyrings/nodesource-keyring.gpg
        rm -f /usr/share/keyrings/spotify.gpg
        rm -f /usr/share/keyrings/spotify-archive-keyring.gpg
        rm -f /usr/share/keyrings/google-chrome.gpg
        rm -f /usr/share/keyrings/google-archive-keyring.gpg
      become: yes
      ignore_errors: yes

    - name: Log cleanup complete
      lineinfile:
        path: "{{ log_file }}"
        line: "Pre-task cleanup of conflicting keys and repos completed"
        state: present
      become: no

  tasks:

    # -------------------------------------------------------
    # SECTION 1: PREREQUISITES
    # -------------------------------------------------------
    - name: Check and Install Prerequisites
      include_tasks: tasks/check_prerequisites.yml

    # -------------------------------------------------------
    # SECTION 2: INITIAL SYSTEM UPDATE
    # -------------------------------------------------------
    - name: Update package cache
      apt:
        update_cache: yes
      become: yes

    - name: Upgrade all packages
      apt:
        upgrade: dist
      become: yes

    - name: Log initial upgrade
      lineinfile:
        path: "{{ log_file }}"
        line: "Package cache updated and system upgraded"
        state: present
      become: no

    # -------------------------------------------------------
    # SECTION 3: GPG KEYS AND REPOSITORIES
    # All keys use curl | gpg --dearmor to produce binary .gpg
    # All repos written with shell + tee to avoid apt_repository
    # cache conflicts
    # -------------------------------------------------------
    - name: Log repository setup start
      lineinfile:
        path: "{{ log_file }}"
        line: "========== CONFIGURING REPOSITORIES =========="
        state: present
      become: no

    - name: Add Microsoft VS Code GPG key (dearmored)
      shell: |
        curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
          | gpg --dearmor \
          | tee /usr/share/keyrings/microsoft.gpg > /dev/null
        chmod 644 /usr/share/keyrings/microsoft.gpg
      become: yes
      ignore_errors: yes

    - name: Add VS Code repository
      shell: |
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/repos/code stable main" \
          | tee /etc/apt/sources.list.d/vscode.list > /dev/null
      become: yes
      ignore_errors: yes

    - name: Add NodeSource repository via official setup script
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
      become: yes
      ignore_errors: yes

    - name: Add Spotify GPG key (dearmored)
      shell: |
        curl -fsSL https://download.spotify.com/debian/pubkey_6224F9941A8AA6D1.gpg \
          | gpg --dearmor \
          | tee /usr/share/keyrings/spotify.gpg > /dev/null
        chmod 644 /usr/share/keyrings/spotify.gpg
      become: yes
      ignore_errors: yes

    - name: Add Spotify repository
      shell: |
        echo "deb [signed-by=/usr/share/keyrings/spotify.gpg] http://repository.spotify.com stable non-free" \
          | tee /etc/apt/sources.list.d/spotify.list > /dev/null
      become: yes
      ignore_errors: yes

    - name: Add Google Chrome GPG key (dearmored)
      shell: |
        curl -fsSL https://dl.google.com/linux/linux_signing_key.pub \
          | gpg --dearmor \
          | tee /usr/share/keyrings/google-chrome.gpg > /dev/null
        chmod 644 /usr/share/keyrings/google-chrome.gpg
      become: yes
      ignore_errors: yes

    - name: Add Google Chrome repository
      shell: |
        echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" \
          | tee /etc/apt/sources.list.d/google-chrome.list > /dev/null
      become: yes
      ignore_errors: yes

    - name: Add NVIDIA graphics drivers PPA
      apt_repository:
        repo: "ppa:graphics-drivers/ppa"
        state: present
      become: yes
      ignore_errors: yes

    - name: Log repository setup complete
      lineinfile:
        path: "{{ log_file }}"
        line: "All repositories and GPG keys configured"
        state: present
      become: no

    # -------------------------------------------------------
    # SECTION 4: SINGLE APT UPDATE AFTER ALL REPOS ARE SET
    # -------------------------------------------------------
    - name: Update apt cache after all repositories are added
      apt:
        update_cache: yes
      become: yes

    - name: Log apt cache update
      lineinfile:
        path: "{{ log_file }}"
        line: "APT cache successfully updated with all new repositories"
        state: present
      become: no

    # -------------------------------------------------------
    # SECTION 5: GRAPHICS DRIVERS
    # -------------------------------------------------------
    - name: Log graphics start
      lineinfile:
        path: "{{ log_file }}"
        line: "========== GRAPHICS DRIVERS =========="
        state: present
      become: no

    - name: Include graphics tasks
      include_tasks: tasks/graphics.yml

    - name: Log graphics complete
      lineinfile:
        path: "{{ log_file }}"
        line: "Graphics drivers installation completed"
        state: present
      become: no

    # -------------------------------------------------------
    # SECTION 6: SYSTEM UTILITIES
    # -------------------------------------------------------
    - name: Log system utilities start
      lineinfile:
        path: "{{ log_file }}"
        line: "========== SYSTEM UTILITIES =========="
        state: present
      become: no

    - name: Install basic utilities
      apt:
        name:
          - zip
          - gzip
          - tar
          - nano
          - htop
          - vim
          - curl
          - wget
          - git
          - gnupg
          - ca-certificates
          - apt-transport-https
          - software-properties-common
        state: present
      become: yes
      ignore_errors: yes

    - name: Install virtualization tools
      apt:
        name:
          - virt-manager
          - libvirt-daemon-system
          - qemu-system-x86
          - bridge-utils
        state: present
      become: yes
      ignore_errors: yes

    - name: Log system utilities complete
      lineinfile:
        path: "{{ log_file }}"
        line: "System utilities installed"
        state: present
      become: no

    # -------------------------------------------------------
    # SECTION 7: PROGRAMMING TOOLS
    # -------------------------------------------------------
    - name: Log programming start
      lineinfile:
        path: "{{ log_file }}"
        line: "========== PROGRAMMING TOOLS =========="
        state: present
      become: no

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
      become: yes
      ignore_errors: yes

    - name: Install VS Code
      apt:
        name: code
        state: present
      become: yes
      ignore_errors: yes

    - name: Log programming complete
      lineinfile:
        path: "{{ log_file }}"
        line: "Programming tools installation attempted"
        state: present
      become: no

    # -------------------------------------------------------
    # SECTION 8: PRODUCTIVITY APPS
    # -------------------------------------------------------
    - name: Log productivity start
      lineinfile:
        path: "{{ log_file }}"
        line: "========== PRODUCTIVITY APPS =========="
        state: present
      become: no

    - name: Install Google Chrome
      apt:
        name: google-chrome-stable
        state: present
      become: yes
      ignore_errors: yes

    - name: Find latest Zotero download URL
      shell: >
        curl -sI
        "https://www.zotero.org/download/client/dl?channel=release&platform=linux-x86_64"
        | grep -i "^location:"
        | awk '{print $2}'
        | tr -d '\r\n'
      register: zotero_url
      changed_when: false
      ignore_errors: yes

    - name: Download Zotero tarball
      get_url:
        url: >-
          {{ zotero_url.stdout
          | default('https://download.zotero.org/client/release/7.0.12/Zotero-7.0.12_linux-x86_64.tar.bz2')
          }}
        dest: /tmp/Zotero_linux.tar.bz2
        timeout: 120
        force: yes
      become: yes
      ignore_errors: yes
      register: zotero_dl

    - name: Create Zotero install directory
      file:
        path: /opt/Zotero
        state: directory
        mode: '0755'
      become: yes

    - name: Extract Zotero
      shell: |
        tar -xjf /tmp/Zotero_linux.tar.bz2 -C /opt/Zotero --strip-components=1
      become: yes
      when: zotero_dl is not failed
      ignore_errors: yes
      register: zotero_extract

    - name: Create Zotero symlink in PATH
      file:
        src: /opt/Zotero/zotero
        dest: /usr/local/bin/zotero
        state: link
        force: yes
      become: yes
      when: zotero_extract is not failed
      ignore_errors: yes

    - name: Install Zotero desktop entry
      shell: |
        if [ -f /opt/Zotero/set_launcher_icon ]; then
          /opt/Zotero/set_launcher_icon
        fi
        if [ -f /opt/Zotero/Zotero.desktop ]; then
          cp /opt/Zotero/Zotero.desktop /usr/share/applications/zotero.desktop
        fi
      become: yes
      ignore_errors: yes

    - name: Log productivity complete
      lineinfile:
        path: "{{ log_file }}"
        line: "Productivity apps installation attempted"
        state: present
      become: no

    # -------------------------------------------------------
    # SECTION 9: MEDIA APPLICATIONS
    # -------------------------------------------------------
    - name: Log media start
      lineinfile:
        path: "{{ log_file }}"
        line: "========== MEDIA APPLICATIONS =========="
        state: present
      become: no

    - name: Install media packages
      apt:
        name:
          - obs-studio
          - vlc
          - ffmpeg
        state: present
      become: yes
      ignore_errors: yes

    - name: Download Discord .deb
      get_url:
        url: "https://discord.com/api/download?platform=linux&format=deb"
        dest: /tmp/discord.deb
        timeout: 60
        force: yes
      ignore_errors: yes
      register: discord_dl

    - name: Install Discord from .deb
      apt:
        deb: /tmp/discord.deb
      become: yes
      when: discord_dl is not failed
      ignore_errors: yes

    - name: Install Spotify
      apt:
        name: spotify-client
        state: present
      become: yes
      ignore_errors: yes

    - name: Log media complete
      lineinfile:
        path: "{{ log_file }}"
        line: "Media applications installation attempted"
        state: present
      become: no

  post_tasks:
    # -------------------------------------------------------
    # SECTION 10: CLEANUP AND VERIFICATION
    # -------------------------------------------------------
    - name: Clean apt package cache
      apt:
        autoclean: yes
        autoremove: yes
      become: yes
      ignore_errors: yes

    - name: Update desktop database
      shell: |
        update-desktop-database /usr/share/applications/ 2>/dev/null || true
        update-mime-database /usr/share/mime/ 2>/dev/null || true
        gtk-update-icon-cache /usr/share/icons/hicolor/ 2>/dev/null || true
      become: yes
      ignore_errors: yes

    - name: Refresh KDE application cache
      shell: |
        sudo -u {{ ansible_env.USER }} kbuildsycoca5 --noincremental 2>/dev/null || true
      become: yes
      ignore_errors: yes

    - name: Verify installed applications
      shell: |
        echo "=== Application Verification ==="
        echo "VS Code : $(which code 2>/dev/null || echo NOT FOUND)"
        echo "Zotero  : $(which zotero 2>/dev/null || echo NOT FOUND)"
        echo "Spotify : $(which spotify 2>/dev/null || echo NOT FOUND)"
        echo "Discord : $(which discord 2>/dev/null || echo NOT FOUND)"
        echo "OBS     : $(which obs 2>/dev/null || echo NOT FOUND)"
        echo "Chrome  : $(which google-chrome-stable 2>/dev/null || echo NOT FOUND)"
        echo "Node.js : $(node --version 2>/dev/null || echo NOT FOUND)"
        echo "NVIDIA  : $(nvidia-smi 2>/dev/null | head -1 || echo NOT FOUND - reboot required)"
      register: app_verification
      changed_when: false
      ignore_errors: yes

    - name: Log verification results
      lineinfile:
        path: "{{ log_file }}"
        line: "{{ app_verification.stdout }}"
        state: present
      become: no

    - name: Log completion
      lineinfile:
        path: "{{ log_file }}"
        line: "KUBUNTU SETUP COMPLETED - {{ ansible_date_time.iso8601 }}"
        state: present
      become: no

    - name: Display verification summary
      debug:
        msg: "{{ app_verification.stdout_lines }}"

    - name: Display completion message
      debug:
        msg:
          - "========================================"
          - "Installation Complete!"
          - "Log saved to: {{ log_file }}"
          - "NOTE: A reboot is strongly recommended to"
          - "activate NVIDIA drivers and ensure all"
          - "desktop entries are visible in KDE."
          - "========================================"
