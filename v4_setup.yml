---
- name: Kubuntu PC Setup Playbook with Prerequisites Check
  hosts: localhost
  connection: local
  gather_facts: yes
  
  vars:
    log_dir: "{{ ansible_env.HOME }}/Documents/Ansible_Installation_Log"
    log_file: "{{ log_dir }}/kubuntu_setup_{{ ansible_date_time.iso8601_basic_short }}.log"
    
  pre_tasks:
    - name: Create log directory
      file:
        path: "{{ log_dir }}"
        state: directory
        mode: '0755'
      become: no

    - name: Initialize log file
      copy:
        content: |
          ========================================
          Kubuntu Setup Playbook Execution Log
          ========================================
          Started: {{ ansible_date_time.iso8601 }}
          Hostname: {{ ansible_hostname }}
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Architecture: {{ ansible_architecture }}
          ========================================
          
        dest: "{{ log_file }}"
        mode: '0644'
      become: no

    - name: Update package cache and upgrade
      block:
        - name: Update package cache
          apt:
            update_cache: yes
            cache_valid_time: 3600
          become: yes

        - name: Upgrade all packages
          apt:
            upgrade: dist
          become: yes

        - name: Log upgrades
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ Package cache updated and system upgraded"
            state: present
          become: no

  tasks:
    - name: Install graphics drivers
      block:
        - name: Log graphics start
          lineinfile:
            path: "{{ log_file }}"
            line: "\n========== GRAPHICS DRIVERS ==========\nStarted: {{ ansible_date_time.iso8601 }}"
            state: present
          become: no

        - name: Include graphics tasks
          include_tasks: tasks/graphics.yml

        - name: Log graphics complete
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ Graphics drivers installation completed"
            state: present
          become: no

    - name: Install system utilities
      block:
        - name: Log system start
          lineinfile:
            path: "{{ log_file }}"
            line: "\n========== SYSTEM UTILITIES ==========\nStarted: {{ ansible_date_time.iso8601 }}"
            state: present
          become: no

        - name: Install basic utilities
          apt:
            name:
              - zip
              - gzip
              - tar
              - nano
              - htop
              - vim
              - curl
              - wget
              - git
            state: present
          become: yes
          ignore_errors: yes

        - name: Install virtualization
          apt:
            name:
              - virt-manager
              - libvirt-daemon-system
              - qemu-system-x86
              - bridge-utils
            state: present
          become: yes
          ignore_errors: yes

        - name: Log system complete
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ System utilities installed"
            state: present
          become: no

    - name: Install programming tools
      block:
        - name: Log programming start
          lineinfile:
            path: "{{ log_file }}"
            line: "\n========== PROGRAMMING TOOLS ==========\nStarted: {{ ansible_date_time.iso8601 }}"
            state: present
          become: no

        - name: Install Node.js
          block:
            - name: Add NodeSource GPG key
              apt_key:
                url: https://deb.nodesource.com/gpgkey/nodesource.gpg.key
                state: present
                keyring: /usr/share/keyrings/nodesource.gpg
              become: yes
              ignore_errors: yes

            - name: Add NodeSource repository
              shell: |
                echo "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_18.x {{ ansible_distribution_release }} main" | sudo tee /etc/apt/sources.list.d/nodesource.list
              become: yes
              ignore_errors: yes

            - name: Update apt cache for Node
              apt:
                update_cache: yes
              become: yes
              ignore_errors: yes

            - name: Install Node.js
              apt:
                name: nodejs
                state: present
              become: yes
              ignore_errors: yes
          ignore_errors: yes

        - name: Install VS Code
          block:
            - name: Add Microsoft GPG key
              apt_key:
                url: https://packages.microsoft.com/keys/microsoft.asc
                state: present
              become: yes
              ignore_errors: yes

            - name: Add VS Code repository
              shell: |
                echo "deb [arch=amd64,arm64,armhf signed-by=/usr/share/keyrings/packages.microsoft.gpg] https://packages.microsoft.com/repos/code stable main" | sudo tee /etc/apt/sources.list.d/vscode.list
              become: yes
              ignore_errors: yes

            - name: Update apt cache for VS Code
              apt:
                update_cache: yes
              become: yes
              ignore_errors: yes

            - name: Install VS Code
              apt:
                name: code
                state: present
              become: yes
              ignore_errors: yes
          ignore_errors: yes

        - name: Log programming complete
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ Programming tools installed"
            state: present
          become: no

    - name: Install productivity apps
      block:
        - name: Log productivity start
          lineinfile:
            path: "{{ log_file }}"
            line: "\n========== PRODUCTIVITY APPS ==========\nStarted: {{ ansible_date_time.iso8601 }}"
            state: present
          become: no

        - name: Install Google Chrome
          block:
            - name: Add Chrome GPG key
              apt_key:
                url: https://dl-ssl.google.com/linux/linux_signing_key.pub
                state: present
              become: yes
              ignore_errors: yes

            - name: Add Chrome repository
              shell: |
                echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
              become: yes
              ignore_errors: yes

            - name: Update apt cache for Chrome
              apt:
                update_cache: yes
              become: yes
              ignore_errors: yes

            - name: Install Chrome
              apt:
                name: google-chrome-stable
                state: present
              become: yes
              ignore_errors: yes
          ignore_errors: yes

        - name: Download and install Zotero
          block:
            - name: Download Zotero
              get_url:
                url: "https://www.zotero.org/download/client/dl?channel=release&platform=linux-x86_64"
                dest: /tmp/Zotero.tar.bz2
                timeout: 60
              ignore_errors: yes
              register: zotero_dl

            - name: Extract Zotero
              shell: |
                cd /tmp
                tar -xjf Zotero.tar.bz2
                sudo mv Zotero_linux-x86_64 /opt/Zotero
                sudo ln -sf /opt/Zotero/zotero /usr/local/bin/zotero
              become: yes
              when: zotero_dl.changed
              ignore_errors: yes
          ignore_errors: yes

        - name: Log productivity complete
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ Productivity apps installed"
            state: present
          become: no

    - name: Install media apps
      block:
        - name: Log media start
          lineinfile:
            path: "{{ log_file }}"
            line: "\n========== MEDIA APPLICATIONS ==========\nStarted: {{ ansible_date_time.iso8601 }}"
            state: present
          become: no

        - name: Install media packages
          apt:
            name:
              - obs-studio
              - vlc
              - ffmpeg
            state: present
          become: yes
          ignore_errors: yes

        - name: Install Discord
          block:
            - name: Download Discord
              get_url:
                url: https://discord.com/api/download?platform=linux&format=deb
                dest: /tmp/discord.deb
                timeout: 60
              ignore_errors: yes
              register: discord_dl

            - name: Install Discord
              apt:
                deb: /tmp/discord.deb
              become: yes
              when: discord_dl.changed
              ignore_errors: yes
          ignore_errors: yes

        - name: Install Spotify
          block:
            - name: Add Spotify GPG key
              apt_key:
                url: https://download.spotify.com/debian/pubkey_6224F9941A8AA6D1.gpg
                state: present
              become: yes
              ignore_errors: yes

            - name: Add Spotify repository
              shell: |
                echo "deb http://repository.spotify.com stable non-free" | sudo tee /etc/apt/sources.list.d/spotify.list
              become: yes
              ignore_errors: yes

            - name: Update apt cache for Spotify
              apt:
                update_cache: yes
              become: yes
              ignore_errors: yes

            - name: Install Spotify
              apt:
                name: spotify-client
                state: present
              become: yes
              ignore_errors: yes
          ignore_errors: yes

        - name: Log media complete
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ Media applications installed"
            state: present
          become: no

  post_tasks:
    - name: Cleanup and summary
      block:
        - name: Clean package cache
          apt:
            autoclean: yes
            autoremove: yes
          become: yes
          ignore_errors: yes

        - name: Log completion
          lineinfile:
            path: "{{ log_file }}"
            line: |
              
              ========================================
              ✓ KUBUNTU SETUP COMPLETED SUCCESSFULLY!
              ========================================
              Completed: {{ ansible_date_time.iso8601 }}
              Log file: {{ log_file }}
              ========================================
            state: present
          become: no

        - name: Display completion message
          debug:
            msg: |
              ========================================
              ✓ Installation Complete!
              ========================================
              Log: {{ log_file }}
              ========================================
          become: no
