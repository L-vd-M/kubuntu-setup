---
- name: Test NodeSource Installation
  hosts: localhost
  connection: local
  gather_facts: yes
  become: yes
  tasks:
    - name: Install dependencies for NodeSource
      ansible.builtin.apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present
        update_cache: yes

    - name: Create directory for apt keyrings
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download NodeSource GPG key
      ansible.builtin.get_url:
        url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
        dest: /etc/apt/keyrings/nodesource.asc
        mode: '0644'
        force: yes

    - name: Add NodeSource Node 22.x repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/nodesource.asc arch={{ dpkg_arch | default('amd64') }}] https://deb.nodesource.com/node_22.x nodistro main"
        state: present
        filename: nodesource

    - name: Install Node.js
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: yes
      register: nodejs_install

    - name: Show Node.js version installed
      command: node --version
      register: node_version
      changed_when: false

    - name: Debug Output
      debug:
        msg: "Installed Node.js version: {{ node_version.stdout }}"
