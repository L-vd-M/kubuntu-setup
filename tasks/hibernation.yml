---
- name: Calculate Dynamic Swap Configurations
  set_fact:
    swap_file: "/swapfile"
    required_swap_mb: "{{ ansible_memtotal_mb + 2048 }}"
    required_swap_gb: "{{ ((ansible_memtotal_mb + 2048) | int / 1024) | round(0, 'ceil') | int }}"
- name: Ensure OS is Debian or Ubuntu based
  fail:
    msg: "This hibernation automation is explicitly designed for Debian/Ubuntu environments (Kubuntu, Ubuntu, Mint, Pop!_OS). It relies on `update-grub` and `initramfs-tools`. Other distributions like Fedora (Dracut) or Arch (mkinitcpio) handle kernel bootloaders differently."
  when: ansible_os_family != "Debian"

- name: Display current system parameters
  debug:
    msg: >-
      Total RAM: {{ ansible_memtotal_mb }} MB.
      Existing Swap Total: {{ ansible_swaptotal_mb }} MB.
      Required Swap for Hibernation: {{ required_swap_mb }} MB (~{{ required_swap_gb }} GB).

- name: Prompt to resize swap
  pause:
    prompt: "\nYour current swap is too small for reliable hibernation.\nIt must be at least {{ required_swap_gb }} GB.\n\nDo you want to safely resize {{ swap_file }} to {{ required_swap_gb }}GB now? (y/N)"
  register: resize_prompt
  when: ansible_swaptotal_mb | int < required_swap_mb | int

- name: Resize Swap Process
  block:
    - name: Disable current swap
      command: swapoff -a

    - name: Create larger swapfile via dd (this takes up to a minute)
      command: "dd if=/dev/zero of={{ swap_file }} bs=1M count={{ required_swap_mb }} status=progress"
      register: dd_output

    - name: Set correct permissions on swapfile
      file:
        path: "{{ swap_file }}"
        owner: root
        group: root
        mode: '0600'

    - name: Make swap
      command: mkswap {{ swap_file }}

    - name: Enable new swap
      command: swapon {{ swap_file }}

    - name: Add swap to fstab (if not already there)
      mount:
        path: none
        src: "{{ swap_file }}"
        fstype: swap
        opts: sw
        passno: 0
        dump: 0
        state: present
  when: 
    - ansible_swaptotal_mb | int < required_swap_mb | int
    - (resize_prompt.user_input | default('N', true) | lower) == 'y'

# We must identify exactly which disk partition holds the swapfile
# so the kernel knows which disk to spin up to resume the state.
- name: Get partition UUID hosting the swapfile
  command: "findmnt -no UUID -T {{ swap_file }}"
  register: root_uuid_output
  changed_when: false

# We must find the physical block offset of the swapfile relative to the start
# of the partition. We parse the 'filefrag' output, pull the first block location
# (awk $1=="0:"), and sanitize it (tr -d '.') to get a clean number for GRUB.
- name: Get physical swapfile offset
  shell: "filefrag -v {{ swap_file }} | awk '{ if($1==\"0:\"){print $4} }' | tr -d '.'"
  register: swap_offset_output
  changed_when: false

- name: Assign UUID and Offset facts
  set_fact:
    target_uuid: "{{ root_uuid_output.stdout | trim }}"
    target_offset: "{{ swap_offset_output.stdout | trim }}"

- name: Display Hibernation Configuration
  debug:
    msg: >-
      Identified UUID: {{ target_uuid }}
      Identified Offset: {{ target_offset }}
      These are the exact properties required for your kernel to resume from hibernation safely.

- name: Prompt to apply config
  pause:
    prompt: "\nDo you want to apply these variables to GRUB and Initramfs to permanently enable hibernation? (y/N)"
  register: apply_prompt

- name: Apply Hibernation Changes
  block:
    - name: Configure initramfs resume parameter
      # initramfs-tools only recognises RESUME=; resume_offset belongs in GRUB only
      copy:
        dest: /etc/initramfs-tools/conf.d/resume
        content: "RESUME=UUID={{ target_uuid }}\n"
        owner: root
        group: root
        mode: '0644'

    - name: Backup GRUB config
      copy:
        src: /etc/default/grub
        dest: "/etc/default/grub.bak"
        remote_src: yes
        force: no

    - name: Ensure hibernation resume params are in GRUB
      # Each param is checked individually and added if missing, or updated if changed.
      # This safely coexists with other tasks (e.g. graphics.yml) that also modify
      # GRUB_CMDLINE_LINUX_DEFAULT, avoiding fragile negative-lookahead regex.
      shell: |
        GRUB_FILE="/etc/default/grub"
        CHANGED=0

        # Handle resume=UUID= — update existing or add new
        CURRENT=$(grep -oP 'resume=UUID=[^\s"]+' "$GRUB_FILE" || true)
        TARGET="resume=UUID={{ target_uuid }}"
        if [ -z "$CURRENT" ]; then
          sed -i "s/^\(GRUB_CMDLINE_LINUX_DEFAULT=\"[^\"]*\)\"/\1 $TARGET\"/" "$GRUB_FILE"
          CHANGED=1
        elif [ "$CURRENT" != "$TARGET" ]; then
          sed -i "s|$CURRENT|$TARGET|" "$GRUB_FILE"
          CHANGED=1
        fi

        # Handle resume_offset= — update existing or add new
        CURRENT=$(grep -oP 'resume_offset=[^\s"]+' "$GRUB_FILE" || true)
        TARGET="resume_offset={{ target_offset }}"
        if [ -z "$CURRENT" ]; then
          sed -i "s/^\(GRUB_CMDLINE_LINUX_DEFAULT=\"[^\"]*\)\"/\1 $TARGET\"/" "$GRUB_FILE"
          CHANGED=1
        elif [ "$CURRENT" != "$TARGET" ]; then
          sed -i "s|$CURRENT|$TARGET|" "$GRUB_FILE"
          CHANGED=1
        fi

        echo "changed=$CHANGED"
      register: grub_hibernate_params
      changed_when: "'changed=1' in grub_hibernate_params.stdout"

    - name: Ensure modern polkit rules directory exists
      file:
        path: /etc/polkit-1/rules.d
        state: directory
        mode: '0755'

    - name: Enable UI Hibernation Support (Modern JavaScript Rules)
      copy:
        dest: /etc/polkit-1/rules.d/10-enable-hibernate.rules
        content: |
          polkit.addRule(function(action, subject) {
              if (action.id == "org.freedesktop.login1.hibernate" ||
                  action.id == "org.freedesktop.login1.hibernate-multiple-sessions" ||
                  action.id == "org.freedesktop.upower.hibernate" ||
                  action.id == "org.freedesktop.login1.handle-hibernate-key" ||
                  action.id == "org.freedesktop.login1.hibernate-ignore-inhibit") {
                  return polkit.Result.YES;
              }
          });
        owner: root
        group: root
        mode: '0644'

    - name: Ensure system-wide fish functions directory exists
      file:
        path: /etc/fish/functions
        state: directory
        mode: '0755'

    - name: Create system-wide 'hibernate' alias for Fish shell
      copy:
        dest: /etc/fish/functions/hibernate.fish
        content: |
          function hibernate --description 'Instantly hibernate the system'
              systemctl hibernate
          end
          
          function hibrenate --description 'Instantly hibernate the system (typo catch)'
              systemctl hibernate
          end
        owner: root
        group: root
        mode: '0644'

    - name: Update initramfs image
      command: update-initramfs -u

    - name: Update GRUB
      command: update-grub
      when: grub_hibernate_params.changed | default(false)

    - name: Verify hibernation resume file was written correctly
      shell: "grep -E 'RESUME=UUID' /etc/initramfs-tools/conf.d/resume"
      register: resume_verify
      changed_when: false
      ignore_errors: yes

    - name: Verify GRUB resume parameters were applied
      shell: "grep -i 'resume=' /etc/default/grub"
      register: grub_resume_verify
      changed_when: false
      ignore_errors: yes

    - name: Log hibernation verification results
      lineinfile:
        path: "{{ log_file }}"
        line: "{{ item }}"
        state: present
      loop:
        - "Hibernation configuration verification:"
        - "  Resume file: {{ 'OK - ' + resume_verify.stdout | trim if resume_verify.rc == 0 else 'MISSING - check /etc/initramfs-tools/conf.d/resume' }}"
        - "  GRUB resume: {{ 'OK - ' + grub_resume_verify.stdout | trim if grub_resume_verify.rc == 0 else 'MISSING - resume params may not have been applied' }}"
      become: no

    - name: Set reboot required flag for hibernation configuration
      set_fact:
        needs_reboot: true

  when: (apply_prompt.user_input | default('n', true) | lower) == 'y'

