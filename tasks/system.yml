---
- name: System and Utility Packages
  block:
    - name: Check for prerequisite system utilities
      block:
        - name: Log system utilities check
          lineinfile:
            path: "{{ log_file }}"
            line: "Checking system utilities..."
            state: present
          become: no

        - name: Check compression utilities
          command: "{{ item }}"
          register: compression_check
          loop:
            - "which zip"
            - "which gzip"
            - "which tar"
          ignore_errors: yes
          changed_when: false

    - name: Install compression utilities
      apt:
        name:
          - zip
          - gzip
          - tar
        state: present
      register: compression_install

    - name: Log compression utilities installation
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ Compression utilities installed (zip, gzip, tar) - Status: {{ compression_install.changed | ternary('Installed', 'Already installed') }}"
        state: present
      become: no

    - name: Check for text editor
      command: which nano
      register: nano_check
      ignore_errors: yes
      changed_when: false

    - name: Install text editor (nano)
      apt:
        name: nano
        state: present
      register: nano_install
      when: nano_check.rc != 0

    - name: Log nano installation
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ Nano text editor - Status: {{ 'Installed' if nano_install.changed else 'Already installed' }}"
        state: present
      become: no

    - name: Check for system monitoring tools
      block:
        - name: Check if htop is installed
          command: which htop
          register: htop_check
          ignore_errors: yes
          changed_when: false

        - name: Check if gtop is installed
          command: which gtop
          register: gtop_check
          ignore_errors: yes
          changed_when: false

    - name: Install system monitoring tools
      apt:
        name: htop
        state: present
      register: htop_install

    - name: Log htop installation
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ Htop system monitor - Status: {{ htop_install.changed | ternary('Installed', 'Already installed') }}"
        state: present
      become: no

    - name: Install gtop via npm
      block:
        - name: Check if npm is available
          command: which npm
          register: npm_check
          ignore_errors: yes
          changed_when: false

        - name: Install gtop via npm
          shell: npm install -g gtop
          when: npm_check.rc == 0
          ignore_errors: yes
          register: gtop_install

        - name: Log gtop installation
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ Gtop system monitor - Status: {{ gtop_install.changed | ternary('Installed', 'Skipped (npm not available)') }}"
            state: present
          become: no

    - name: Check for VirtualBox
      command: which virtualbox
      register: virtualbox_check
      ignore_errors: yes
      changed_when: false

    - name: Install Oracle VirtualBox
      block:
        - name: Add VirtualBox repository key
          apt_key:
            url: https://www.virtualbox.org/download/oracle_vbox_2016.asc
            state: present
          ignore_errors: yes

        - name: Add VirtualBox repository
          apt_repository:
            repo: "deb [arch={{ dpkg_arch }}] https://download.virtualbox.org/virtualbox/debian {{ ansible_distribution_release }} contrib"
            state: present
          ignore_errors: yes

        - name: Install VirtualBox
          apt:
            name: virtualbox-7.0
            state: present
            update_cache: yes
          ignore_errors: yes
          register: virtualbox_install

        - name: Log VirtualBox installation
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ Oracle VirtualBox 7.0 - Status: {{ virtualbox_install.changed | ternary('Installed', 'Already installed') }}"
            state: present
          become: no

    - name: Check for Virt-Manager
      command: which virt-manager
      register: virt_manager_check
      ignore_errors: yes
      changed_when: false

    - name: Install Virt-Manager and KVM/QEMU
      block:
        - name: Install virtualization packages
          apt:
            name:
              - virt-manager
              - libvirt-daemon-system
              - qemu-system-x86
              - bridge-utils
            state: present
          register: virt_manager_install

        - name: Enable and start libvirtd service
          systemd:
            name: libvirtd
            enabled: yes
            state: started
          ignore_errors: yes

        - name: Log Virt-Manager installation
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ Virt-Manager (KVM/QEMU) - Status: {{ virt_manager_install.changed | ternary('Installed', 'Already installed') }}"
            state: present
          become: no

    - name: Check for build essentials
      command: dpkg -l | grep build-essential
      register: build_essential_check
      ignore_errors: yes
      changed_when: false

    - name: Install build essentials
      apt:
        name:
          - build-essential
          - linux-headers-generic
        state: present
      register: build_essential_install
      when: build_essential_check.rc != 0

    - name: Log build essentials installation
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ Build essentials and Linux headers - Status: {{ 'Installed' if build_essential_install.changed else 'Already installed' }}"
        state: present
      become: no

  rescue:
    - name: Log system utilities error
      lineinfile:
        path: "{{ log_file }}"
        line: "✗ Error during system utilities installation - continuing with next section"
        state: present
      become: no
