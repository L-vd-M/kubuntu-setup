---
- name: System and Utility Packages
  block:
    - name: Check for prerequisite system utilities
      block:
        - name: Log system utilities check
          lineinfile:
            path: "{{ log_file }}"
            line: "Checking system utilities..."
            state: present
          become: no

        - name: Check compression utilities
          command: "{{ item }}"
          register: compression_check
          loop:
            - "which zip"
            - "which gzip"
            - "which tar"
          ignore_errors: yes
          changed_when: false

    - name: Install compression utilities
      apt:
        name:
          - zip
          - gzip
          - tar
        state: present
      register: compression_install

    - name: Log compression utilities installation
      lineinfile:
        path: "{{ log_file }}"
        line: "{% if compression_install.failed | default(false) %}✗ Compression utilities installed (zip, gzip, tar) - Status: Failed{% else %}✓ Compression utilities installed (zip, gzip, tar) - Status: {{ compression_install.changed | default(false) | ternary('Installed/Updated', 'Already installed') }}{% endif %}"
        state: present
      become: no

    - name: Check for text editor
      command: which nano
      register: nano_check
      ignore_errors: yes
      changed_when: false

    - name: Install text editor (nano)
      apt:
        name: nano
        state: present
      register: nano_install
      when: nano_check.rc != 0

    - name: Log nano installation
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ Nano text editor - Status: {{ 'Installed' if nano_install.changed | default(false) else 'Already installed' }}"
        state: present
      become: no

    - name: Check for system monitoring tools
      block:
        - name: Check if htop is installed
          command: which htop
          register: htop_check
          ignore_errors: yes
          changed_when: false

        - name: Check if btop is installed
          command: which btop
          register: btop_check
          ignore_errors: yes
          changed_when: false

        - name: Check if gtop is installed
          command: which gtop
          register: gtop_check
          ignore_errors: yes
          changed_when: false

    - name: Install system monitoring tools
      apt:
        name: 
          - htop
          - btop
        state: present
      register: htop_install

    - name: Log htop & btop installation
      lineinfile:
        path: "{{ log_file }}"
        line: "{% if htop_install.failed | default(false) %}✗ System monitors (htop, btop) - Status: Failed{% else %}✓ System monitors (htop, btop) - Status: {{ htop_install.changed | default(false) | ternary('Installed/Updated', 'Already installed') }}{% endif %}"
        state: present
      become: no

    - name: Install gtop via npm
      block:
        - name: Check if npm is available
          command: which npm
          register: npm_check
          ignore_errors: yes
          changed_when: false

        - name: Install gtop via npm
          shell: npm install -g gtop
          when: npm_check.rc == 0
          ignore_errors: yes
          register: gtop_install

        - name: Log gtop installation
          lineinfile:
            path: "{{ log_file }}"
            line: "{% if gtop_install.failed | default(false) %}✗ Gtop system monitor - Status: Failed{% else %}✓ Gtop system monitor - Status: {{ gtop_install.changed | default(false) | ternary('Installed/Updated', 'Already installed') }}{% endif %}"
            state: present
          become: no

    - name: Check for VirtualBox
      command: which virtualbox
      register: virtualbox_check
      ignore_errors: yes
      changed_when: false

    - name: Install Oracle VirtualBox
      block:
        - name: Download VirtualBox repository keyring
          get_url:
            url: https://www.virtualbox.org/download/oracle_vbox_2016.asc
            dest: /etc/apt/keyrings/oracle_vbox_2016.asc
            mode: '0644'
            force: yes
          ignore_errors: yes

        - name: Add VirtualBox repository
          apt_repository:
            repo: "deb [arch={{ dpkg_arch }} signed-by=/etc/apt/keyrings/oracle_vbox_2016.asc] https://download.virtualbox.org/virtualbox/debian {{ ansible_distribution_release }} contrib"
            state: present
          ignore_errors: yes

        - name: Install VirtualBox
          apt:
            name: virtualbox-7.0
            state: present
            update_cache: yes
          ignore_errors: yes
          register: virtualbox_install

        - name: Log VirtualBox installation
          lineinfile:
            path: "{{ log_file }}"
            line: "{% if virtualbox_install.failed | default(false) %}✗ Oracle VirtualBox 7.0 - Status: Failed{% else %}✓ Oracle VirtualBox 7.0 - Status: {{ virtualbox_install.changed | default(false) | ternary('Installed/Updated', 'Already installed') }}{% endif %}"
            state: present
          become: no

    - name: Check for Virt-Manager
      command: which virt-manager
      register: virt_manager_check
      ignore_errors: yes
      changed_when: false

    - name: Install Virt-Manager and KVM/QEMU
      block:
        - name: Install virtualization packages
          apt:
            name:
              - virt-manager
              - libvirt-daemon-system
              - qemu-system-x86
              - bridge-utils
            state: present
          register: virt_manager_install

        - name: Enable and start libvirtd service
          systemd:
            name: libvirtd
            enabled: yes
            state: started
          ignore_errors: yes

        - name: Log Virt-Manager installation
          lineinfile:
            path: "{{ log_file }}"
            line: "{% if virt_manager_install.failed | default(false) %}✗ Virt-Manager (KVM/QEMU) - Status: Failed{% else %}✓ Virt-Manager (KVM/QEMU) - Status: {{ virt_manager_install.changed | default(false) | ternary('Installed/Updated', 'Already installed') }}{% endif %}"
            state: present
          become: no

    - name: Check for build essentials
      shell: dpkg -l | grep build-essential
      register: build_essential_check
      ignore_errors: yes
      changed_when: false

    - name: Install build essentials
      apt:
        name:
          - build-essential
          - linux-headers-generic
        state: present
      register: build_essential_install
      when: build_essential_check.rc != 0

    - name: Log build essentials installation
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ Build essentials and Linux headers - Status: {{ 'Installed' if build_essential_install.changed | default(false) else 'Already installed' }}"
        state: present
      become: no

    - name: Check for Fish shell
      command: which fish
      register: fish_check
      ignore_errors: yes
      changed_when: false

    - name: Install and configure Fish shell
      block:
        - name: Add Fish PPA for the latest version
          apt_repository:
            repo: ppa:fish-shell/release-3
            state: present
          become: yes
          ignore_errors: yes

        - name: Install Fish shell
          apt:
            name: fish
            state: present
            update_cache: yes
          become: yes
          register: fish_install

        - name: Ensure Fish is listed as a valid login shell
          lineinfile:
            path: /etc/shells
            line: /usr/bin/fish
            state: present
          become: yes

        - name: Change default shell to Fish for active user
          # Safely handles either normal ansible-playbook execution or sudo ansible-playbook
          user:
            name: "{{ lookup('env', 'SUDO_USER') | default(lookup('env', 'USER'), true) }}"
            shell: /usr/bin/fish
          become: yes

        - name: Log Fish shell installation
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ Fish Shell - Status: {{ 'Installed and set as default' if fish_install.changed | default(false) else 'Already installed' }}"
            state: present
          become: no

  rescue:
    - name: Log system utilities error
      lineinfile:
        path: "{{ log_file }}"
        line: "✗ Error during system utilities installation - continuing with next section"
        state: present
      become: no
