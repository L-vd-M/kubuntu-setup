---
- name: Graphics Card Driver Installation
  block:
    - name: Detect graphics cards
      block:
        - name: Install lspci utility
          apt:
            name: pciutils
            state: present
          become: yes
          ignore_errors: yes

        - name: Detect NVIDIA graphics cards
          shell: lspci | grep -i nvidia || echo "No NVIDIA GPU detected"
          register: nvidia_gpus
          ignore_errors: yes
          changed_when: false

        - name: Detect AMD graphics cards
          shell: lspci | grep -i amd | grep -i vga || echo "No AMD GPU detected"
          register: amd_gpus
          ignore_errors: yes
          changed_when: false

        - name: Detect Intel graphics cards
          shell: lspci | grep -i intel | grep -i vga || echo "No Intel GPU detected"
          register: intel_gpus
          ignore_errors: yes
          changed_when: false

        - name: Log detected graphics cards
          lineinfile:
            path: "{{ log_file }}"
            line: "{{ item }}"
            state: present
          become: no
          loop:
            - "Detected Graphics Cards:"
            - "  NVIDIA: {{ nvidia_gpus.stdout | default('None') }}"
            - "  AMD: {{ amd_gpus.stdout | default('None') }}"
            - "  Intel: {{ intel_gpus.stdout | default('None') }}"

        - name: Display detected graphics cards
          debug:
            msg: |
              ========================================
              DETECTED GRAPHICS CARDS
              ========================================
              
              NVIDIA GPUs:
              {{ nvidia_gpus.stdout if nvidia_gpus.stdout != "No NVIDIA GPU detected" else "None detected" }}
              
              AMD GPUs:
              {{ amd_gpus.stdout if amd_gpus.stdout != "No AMD GPU detected" else "None detected" }}
              
              Intel GPUs:
              {{ intel_gpus.stdout if intel_gpus.stdout != "No Intel GPU detected" else "None detected" }}
              
              ========================================
              Please verify the above graphics cards are correct.
              ========================================

    - name: User confirmation for driver installation
      pause:
        prompt: |
          
          Please verify the graphics cards listed above are correct.
          
          Press ENTER to continue with driver installation, or Ctrl+C to cancel.
          
          NOTE: If you have multiple GPUs, all appropriate drivers will be installed.
      register: user_confirmation
      ignore_errors: yes

    - name: Log user confirmation
      lineinfile:
        path: "{{ log_file }}"
        line: "User confirmed graphics card detection - proceeding with driver installation"
        state: present
      become: no

    - name: Install NVIDIA drivers
      block:
        - name: Check if NVIDIA GPU is present
          set_fact:
            has_nvidia: "{{ 'nvidia' in nvidia_gpus.stdout | lower }}"

        - name: Add NVIDIA PPA repository
          apt_repository:
            repo: "ppa:graphics-drivers/ppa"
            state: present
          when: has_nvidia
          become: yes
          ignore_errors: yes

        - name: Update package cache for NVIDIA
          apt:
            update_cache: yes
          when: has_nvidia
          become: yes

        - name: Install latest NVIDIA drivers
          apt:
            name: 
              - nvidia-driver-latest-dkms
              - nvidia-utils
              - nvidia-settings
            state: present
          when: has_nvidia
          become: yes
          ignore_errors: yes
          register: nvidia_install

        - name: Log NVIDIA driver installation
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ NVIDIA drivers installed successfully (Status: {{ nvidia_install.changed | default(false) | ternary('Changed', 'Already installed') }})"
            state: present
          become: no
          when: has_nvidia

      rescue:
        - name: Log NVIDIA installation failure
          lineinfile:
            path: "{{ log_file }}"
            line: "⚠ NVIDIA driver installation encountered an issue - continuing with other drivers"
            state: present
          become: no

    - name: Install AMD drivers
      block:
        - name: Check if AMD GPU is present
          set_fact:
            has_amd: "{{ 'amd' in amd_gpus.stdout | lower or 'radeon' in amd_gpus.stdout | lower }}"

        - name: Install AMD AMDGPU drivers
          apt:
            name:
              - xserver-xorg-video-amdgpu
              - mesa-vulkan-drivers
              - libvulkan1
            state: present
          when: has_amd
          become: yes
          ignore_errors: yes
          register: amd_install

        - name: Enable AMD AMDGPU kernel module
          shell: |
            echo "amdgpu" | sudo tee -a /etc/modules
            sudo update-initramfs -u
          when: has_amd
          become: yes
          ignore_errors: yes

        - name: Log AMD driver installation
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ AMD drivers installed successfully (Status: {{ amd_install.changed | default(false) | ternary('Changed', 'Already installed') }})"
            state: present
          become: no
          when: has_amd

      rescue:
        - name: Log AMD installation failure
          lineinfile:
            path: "{{ log_file }}"
            line: "⚠ AMD driver installation encountered an issue - continuing with other drivers"
            state: present
          become: no

    - name: Install Intel drivers
      block:
        - name: Check if Intel GPU is present
          set_fact:
            has_intel: "{{ 'intel' in intel_gpus.stdout | lower }}"

        - name: Install Intel graphics drivers
          apt:
            name:
              - intel-gpu-tools
              - intel-media-va-driver-non-free
              - libva-intel-vaapi-driver
              - mesa-vulkan-drivers
            state: present
          when: has_intel
          become: yes
          ignore_errors: yes
          register: intel_install

        - name: Log Intel driver installation
          lineinfile:
            path: "{{ log_file }}"
            line: "✓ Intel drivers installed successfully (Status: {{ intel_install.changed | default(false) | ternary('Changed', 'Already installed') }})"
            state: present
          become: no
          when: has_intel

      rescue:
        - name: Log Intel installation failure
          lineinfile:
            path: "{{ log_file }}"
            line: "⚠ Intel driver installation encountered an issue"
            state: present
          become: no

    - name: Post-installation graphics configuration
      block:
        - name: Update initramfs
          shell: sudo update-initramfs -u
          become: yes
          ignore_errors: yes

        - name: Verify graphics driver installation
          shell: |
            echo "=== Installed Graphics Drivers ===" && \
            lsmod | grep -E "nvidia|amdgpu|i915" || echo "Check drivers manually"
          register: driver_verification
          changed_when: false

        - name: Log driver verification
          lineinfile:
            path: "{{ log_file }}"
            line: "Driver verification:\n{{ driver_verification.stdout }}"
            state: present
          become: no

  rescue:
    - name: Log graphics installation error
      lineinfile:
        path: "{{ log_file }}"
        line: "✗ Graphics driver installation encountered an error. Please review the logs."
        state: present
      become: no
      ignore_errors: yes
