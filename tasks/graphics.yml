---
- name: Install lspci utility
  apt:
    name: pciutils
    state: present
  become: yes

- name: Detect NVIDIA graphics cards
  shell: lspci | grep -i nvidia || echo "No NVIDIA GPU detected"
  register: nvidia_gpus
  changed_when: false
  ignore_errors: yes

- name: Detect AMD graphics cards
  shell: lspci | grep -i amd | grep -iE "vga|display" || echo "No AMD GPU detected"
  register: amd_gpus
  changed_when: false
  ignore_errors: yes

- name: Detect Intel graphics cards
  shell: lspci | grep -i intel | grep -iE "vga|display" || echo "No Intel GPU detected"
  register: intel_gpus
  changed_when: false
  ignore_errors: yes

- name: Log detected graphics cards
  lineinfile:
    path: "{{ log_file }}"
    line: "{{ item }}"
    state: present
  become: no
  loop:
    - "Detected Graphics Cards:"
    - "  NVIDIA: {{ nvidia_gpus.stdout | default('None') }}"
    - "  AMD: {{ amd_gpus.stdout | default('None') }}"
    - "  Intel: {{ intel_gpus.stdout | default('None') }}"

- name: Display detected graphics cards
  debug:
    msg: |
      ========================================
      DETECTED GRAPHICS CARDS
      ========================================
      NVIDIA: {{ nvidia_gpus.stdout }}
      AMD:    {{ amd_gpus.stdout }}
      Intel:  {{ intel_gpus.stdout }}
      ========================================

- name: User confirmation for driver installation
  pause:
    prompt: |

      Please verify the above graphics cards are correct.
      Press ENTER to continue or Ctrl+C then A to abort.

- name: Log user confirmation
  lineinfile:
    path: "{{ log_file }}"
    line: "User confirmed graphics card detection - proceeding with driver installation"
    state: present
  become: no

- name: Set GPU presence facts
  set_fact:
    has_nvidia: "{{ 'nvidia' in nvidia_gpus.stdout | lower }}"
    has_amd: "{{ ('amd' in amd_gpus.stdout | lower) or ('radeon' in amd_gpus.stdout | lower) }}"
    has_intel: "{{ 'intel' in intel_gpus.stdout | lower }}"

# --- NVIDIA ---
- name: Install NVIDIA drivers
  block:
    - name: Install NVIDIA driver 535
      apt:
        name:
          - nvidia-driver-535
          - nvidia-utils-535
          - nvidia-settings
        state: present
      become: yes
      register: nvidia_install

    - name: Log NVIDIA install success
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ NVIDIA drivers installed successfully (Status: {{ nvidia_install.changed | default(false) | ternary('Newly installed', 'Already present') }})"
        state: present
      become: no

  rescue:
    - name: Log NVIDIA install failure
      lineinfile:
        path: "{{ log_file }}"
        line: "⚠ NVIDIA driver installation encountered an issue - continuing"
        state: present
      become: no
  when: has_nvidia

# --- AMD ---
- name: Install AMD drivers
  block:
    - name: Install AMD AMDGPU drivers
      apt:
        name:
          - xserver-xorg-video-amdgpu
          - mesa-vulkan-drivers
          - libvulkan1
        state: present
      become: yes
      register: amd_install
      ignore_errors: yes

    - name: Log AMD install success
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ AMD drivers installed successfully (Status: {{ amd_install.changed | default(false) | ternary('Newly installed', 'Already present') }})"
        state: present
      become: no

  rescue:
    - name: Log AMD install failure
      lineinfile:
        path: "{{ log_file }}"
        line: "⚠ AMD driver installation encountered an issue"
        state: present
      become: no
  when: has_amd

# --- Intel ---
- name: Install Intel drivers
  block:
    - name: Install Intel graphics drivers
      apt:
        name:
          - intel-gpu-tools
          - intel-media-va-driver
          - mesa-vulkan-drivers
          - va-driver-all
        state: present
      become: yes
      register: intel_install
      ignore_errors: yes

    - name: Log Intel install success
      lineinfile:
        path: "{{ log_file }}"
        line: "✓ Intel drivers installed successfully (Status: {{ intel_install.changed | default(false) | ternary('Newly installed', 'Already present') }})"
        state: present
      become: no

  rescue:
    - name: Log Intel install failure
      lineinfile:
        path: "{{ log_file }}"
        line: "⚠ Intel driver installation encountered an issue"
        state: present
      become: no
  when: has_intel

# --- PURGE UNUSED DRIVERS ---
- name: Purge unused GPU drivers
  block:
    - name: Purge NVIDIA drivers if no NVIDIA GPU exists
      apt:
        name: "^nvidia-.*"
        state: absent
        purge: yes
      when: not has_nvidia

    - name: Purge AMD drivers if no AMD GPU exists
      apt:
        name: 
          - xserver-xorg-video-amdgpu
          - xserver-xorg-video-radeon
        state: absent
        purge: yes
      when: not has_amd

    - name: Purge Intel drivers if no Intel GPU exists
      apt:
        name:
          - xserver-xorg-video-intel
          - intel-media-va-driver
        state: absent
        purge: yes
      when: not has_intel
  become: yes
  ignore_errors: yes

- name: Update initramfs
  shell: update-initramfs -u
  become: yes
  ignore_errors: yes

- name: Verify graphics drivers
  shell: |
    echo "=== Installed Graphics Drivers ==="
    lsmod | grep -E "nvidia|amdgpu|i915|xe" || echo "No drivers loaded yet (reboot may be required)"
  register: driver_verification
  changed_when: false
  ignore_errors: yes

- name: Log driver verification
  lineinfile:
    path: "{{ log_file }}"
    line: "Driver verification:\n{{ driver_verification.stdout }}"
    state: present
  become: no
