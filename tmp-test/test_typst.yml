---
- name: Test Typst Installation
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    typst_version: "0.14.0"
    typst_url: "https://github.com/typst/typst/releases/download/v{{ typst_version }}/typst-x86_64-unknown-linux-musl.tar.xz"
    local_bin: "{{ lookup('env', 'HOME') }}/.local/bin"
    download_dir: "/tmp/typst_{{ typst_version }}"

  tasks:
    - name: Ensure ~/.local/bin exists
      file:
        path: "{{ local_bin }}"
        state: directory
        mode: '0755'

    - name: Create temporary download directory
      file:
        path: "{{ download_dir }}"
        state: directory

    - name: Download and extract Typst locally
      unarchive:
        src: "{{ typst_url }}"
        dest: "{{ download_dir }}"
        remote_src: yes
      
    - name: Install Typst binary to ~/.local/bin
      copy:
        src: "{{ download_dir }}/typst-x86_64-unknown-linux-musl/typst"
        dest: "{{ local_bin }}/typst"
        mode: '0755'
        remote_src: yes

    - name: Verify Typst installation
      command: "{{ local_bin }}/typst --version"
      register: typst_version_output
      changed_when: false

    - name: Show Typst version
      debug:
        msg: "Successfully Installed: {{ typst_version_output.stdout }}"
